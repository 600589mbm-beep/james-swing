<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product · James Swing</title>
<style>
  .crumb{font-size:12.5px;color:var(--grey);padding:16px 0}
  .crumb a{color:var(--blue)}
  .pwrap{display:grid;grid-template-columns:1fr 1fr;gap:34px;padding:6px 0 20px}
  @media(max-width:820px){.pwrap{grid-template-columns:1fr}}
  .pimg{background:linear-gradient(135deg,#eef3fb,#d7e4f8);border-radius:14px;display:flex;align-items:center;justify-content:center;min-height:340px;position:relative}
  .pimg svg{width:240px;height:240px;filter:drop-shadow(0 12px 16px rgba(15,30,60,.2))}
  .pimg .cond{position:absolute;top:14px;left:14px;background:var(--blue);color:#fff;font-size:12px;font-weight:800;padding:4px 12px;border-radius:16px}
  .pbrand2{font-size:13px;color:var(--grey);text-transform:uppercase;letter-spacing:1px;font-weight:700}
  .pname2{font-size:30px;font-weight:900;font-style:italic;margin:2px 0 6px}
  .pmsrp2{color:var(--grey);text-decoration:line-through;font-size:14px}
  .pprice2{font-size:38px;font-weight:900;font-style:italic;color:var(--blue);margin:2px 0 4px}
  .specs{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
  .specs td{padding:9px 6px;border-bottom:1px solid var(--line)} .specs td:first-child{color:var(--grey);width:42%}
  .pbtns{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
  .aibox{margin-top:30px;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .aibox .h{background:linear-gradient(135deg,#0a1326,#13234a);color:#fff;padding:14px 18px;font-weight:800;display:flex;align-items:center;gap:10px}
  .aibox .b{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:700px){.aibox .b{grid-template-columns:1fr}}
  .aicard{border:1px solid var(--line);border-radius:10px;padding:16px}
  .aicard b{font-size:14px}.aicard p{font-size:13px;color:var(--grey);margin:6px 0 10px}
  .aiverdict{margin-top:8px;font-size:13.5px;background:#eef7ef;border:1px solid #cfe6d4;color:var(--green);border-radius:8px;padding:10px;display:none}
  .mini{font-size:12px;font-weight:800;color:var(--blue);background:#eaf2ff;border:1px solid #cfe0fb;border-radius:14px;padding:3px 10px;display:inline-block}
</style>
</head>
<body>
<div class="wrap"><div class="crumb"><a href="index.html">Home</a> › <a href="shop.html">Shop</a> › <span id="cb"></span></div></div>
<div class="wrap" id="content"></div>

<script src="store.js"></script>
<script>
renderChrome('');
const p=PRODUCTS.find(x=>x.id==(qp('id')||1))||PRODUCTS[0];
document.getElementById('cb').textContent=p.b+' '+p.m;
const market=Math.round(p.price*1.18/5)*5; // implied market from AI comps
const saving=market-Math.round(p.price);
document.getElementById('content').innerHTML=`
<div class="pwrap">
  <div class="pimg">${svgFor(p.t)}<span class="cond">${p.cond}</span></div>
  <div>
    <div class="pbrand2">${p.b}</div>
    <div class="pname2">${p.m}</div>
    <div class="pmsrp2">MSRP ${money(p.msrp)}</div>
    <div class="pprice2">${money(p.price)}</div>
    <span class="mini">🤖 AI-priced · ${saving>0?'$'+saving+' below market':'at market'}</span>
    <table class="specs">
      <tr><td>Condition</td><td>${p.cond}</td></tr>
      <tr><td>Dexterity</td><td>${p.dex}</td></tr>
      <tr><td>Flex</td><td>${p.flex}</td></tr>
      <tr><td>Loft / Spec</td><td>${p.loft}</td></tr>
    </table>
    <p style="color:var(--grey);font-size:14px">${p.blurb} Backed by the 90-day playability guarantee.</p>
    <div class="pbtns">
      <button class="cta" onclick="toast('Added ${p.b} ${p.m} to cart')">Add to Cart</button>
      <button class="cta blue" onclick="window.open('club-fit-assistant.html','_blank')">Will this fit me?</button>
    </div>
  </div>
</div>

<div class="aibox">
  <div class="h">🤖 AI agents working on this club</div>
  <div class="b">
    <div class="aicard">
      <b>💰 Pricing Agent</b>
      <p>Checks this club against live sold-comps and reprices for best value.</p>
      <button class="cta blue" style="padding:9px 16px;font-size:13px" onclick="runPrice()">Run AI price check</button>
      <div class="aiverdict" id="pv"></div>
    </div>
    <div class="aicard">
      <b>🎯 Fitting Agent</b>
      <p>Tells you if this club suits your game before you buy.</p>
      <button class="cta blue" style="padding:9px 16px;font-size:13px" onclick="window.open('club-fit-assistant.html','_blank')">Check my fit →</button>
    </div>
    <div class="aicard">
      <b>📝 Listing Agent</b>
      <p>Got one to trade toward this? Value it in seconds.</p>
      <button class="cta blue" style="padding:9px 16px;font-size:13px" onclick="window.open('listing-agent.html','_blank')">Value my trade-in →</button>
    </div>
    <div class="aicard">
      <b>🧠 Orchestrator</b>
      <p>See the whole agent team run the store end-to-end.</p>
      <button class="cta blue" style="padding:9px 16px;font-size:13px" onclick="window.open('agents-hub.html','_blank')">Open Ops Center →</button>
    </div>
  </div>
</div>
<div style="height:30px"></div>`;
function runPrice(){const v=document.getElementById('pv');v.style.display='block';v.textContent='✓ Checked 24 recent sold comps. Market avg '+money(market)+' → priced '+(saving>0?money(saving)+' below market. Great deal.':'at market value.');}
</script>
<script src="caddie.js"></script>
</body>
</html>
